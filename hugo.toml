title = "idodo.dev"
baseURL = "https://idodo.dev/"
languageCode = "en-us"
defaultContentLanguage = "en-gb"
enableEmoji = true

[module]
  [[module.imports]]
    path = "github.com/hugo-sid/hugo-blog-awesome"

[params]
  description = "A blog about engineering, automation, and slashing cloud bills."
  mainSections = ['posts']

[params.author]
  avatar = "avatar.png"
  intro = "Hi, I'm Ido Avraham"
  name = "Ido Avraham"
  description = """
    Cloud & DevOps Engineer who loves building things that (mostly) don't break. I ship code from ideation to production — everything here is battle-tested by me, though the actual words were most-likely written by some large language model. I live for the curiosity of how things really work and the obsession with making them better.
  """

[[params.socialIcons]]
name = "github"
url = "https://github.com/idoavrah"

[[params.socialIcons]]
name = "X"
url = "https://x.com/idoavraham"

[[params.socialIcons]]
name = "LinkedIn"
url = "https://linkedin.com/in/idoavraham"

# set markup.highlight.noClasses=false to enable code highlight
[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true
	[markup.tableOfContents]
		startLevel = 2 # ToC starts from H2
		endLevel = 4 # ToC ends at H4
		ordered = false # generates <ul> instead of <ol>
